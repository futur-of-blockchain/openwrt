name: Build OpenWRT Firmware and Packages for EKH01

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: Linux
    container:
      image: ubuntu:24.04
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget libelf-dev \
            autoconf automake libtool ccache ecj fastjar \
            java-propose-classpath curl ca-certificates

      - name: Verify Python version
        run: python3 --version

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/openwrt/openwrt

      - name: Add morse micro feeds and configuration for EKH01 in spi mode
        run: ./scripts/morse_setup.sh -i -b ekh01 -x spi

      - name: Add Post World Survival specificities
        run: ./scripts/pwst.sh

      - name: Download dependencies
        run: make download

      - name: Build OpenWrt firmware
        run: |
          echo "Starting full OpenWrt build..."
          make -j$(nproc)
        env:
          FORCE_UNSAFE_CONFIGURE: 1

      - name: Create artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ekh01-firmware-n-packages
          path: bin/
          retention-days: 90
          if-no-files-found: error
          compression-level: 6
          overwrite: false
          include-hidden-files: true